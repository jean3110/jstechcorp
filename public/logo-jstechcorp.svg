<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48" role="img" aria-label="JS Tech Corp">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6CF7"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square icon -->
  <rect x="0" y="4" width="40" height="40" rx="10" ry="10" fill="url(#iconGrad)"/>

  <!-- "JS" text inside icon -->
  <text
    x="20" y="30"
    font-family="Space Grotesk, Inter, sans-serif"
    font-size="16"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-0.3"
  >JS</text>

  <!-- "Tech Corp" wordmark -->
  <text
    x="52" y="30"
    font-family="Space Grotesk, Inter, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#FFFFFF"
    letter-spacing="-0.2"
  >Tech Corp</text>
</svg>
