<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 68" fill="none">
  <defs>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="corp-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: rounded square with glow -->
  <rect x="1" y="1" width="66" height="66" rx="15" fill="url(#icon-grad)" opacity="0.25" filter="url(#glow)"/>
  <rect x="0" y="0" width="68" height="68" rx="15" fill="url(#icon-grad)"/>

  <!-- JS lettermark -->
  <text x="34" y="47" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="white" letter-spacing="-2">JS</text>

  <!-- Divider dot -->
  <circle cx="88" cy="34" r="2.5" fill="#6366F1" opacity="0.6"/>

  <!-- TECH wordmark -->
  <text x="100" y="38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white" letter-spacing="2">TECH</text>

  <!-- CORP tagline -->
  <text x="101" y="57" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="500" fill="url(#corp-grad)" letter-spacing="7">CORP</text>
</svg>
